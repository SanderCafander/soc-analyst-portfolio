
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOC Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: #c9d1d9;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #161b22;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #30363d;
}

.sidebar h2 {
    color: #58a6ff;
    font-size: 18px;
}

.case {
    padding: 6px;
    cursor: pointer;
    font-size: 13px;
}

.case:hover {
    background: #21262d;
}

/* Viewer */
.viewer {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.viewer h1 {
    color: #58a6ff;
}

img {
    max-width: 80%;
    margin-top: 15px;
    border: 1px solid #30363d;
}

/* Header */
.header {
    padding: 10px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
}

</style>
</head>

<body>

<div class="header">
<h1>📊 SOC Dashboard</h1>
<p id="count"></p>
</div>

<div class="container">

<div class="sidebar">
<h2>Phishing (2)</h2><div class="case" onclick="loadCase('Phishing/20260419_phishing_whit_good_email.md')">20260419_phishing_whit_good_email.md</div><div class="case" onclick="loadCase('Phishing/20260418_1.md')">20260418_1.md</div>
</div>

<div class="viewer">
<h2>Case Viewer</h2>
<div id="content">Select a case...</div>
</div>

</div>

<script>

document.getElementById("count").innerText = "Total Cases: 2";

function loadCase(path) {
    fetch(path)
    .then(res => res.text())
    .then(data => {

        let html = data
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

        const match = data.match(/!\[.*?\]\((.*?)\)/);
        if (match) {
            html += "<br><img src='" + path.replace(/[^/]+$/, '') + match[1] + "'>";
        }

        document.getElementById("content").innerHTML = html;
    });
}

</script>

</body>
</html>
